<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XFourteenAI | DziyX Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Loading Screen -->
<div id="loading" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center transition-opacity duration-700">
    <div class="w-14 h-14 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-5"></div>
    <h2 class="text-xl sm:text-2xl font-extrabold tracking-tighter italic">XFOURTEEN <span class="text-blue-500">AI</span></h2>
    <p class="text-[10px] text-gray-500 mt-3 tracking-wider">DziyX XFourteen Core</p>
</div>

<!-- Installer Animation Dialog -->
<div id="installerModal" class="fixed inset-0 z-[1000] flex items-center justify-center bg-black/70 backdrop-blur-lg hidden opacity-0 transition-opacity duration-300">
    <div class="w-[280px] sm:w-[320px] glass p-5 rounded-[32px] border border-white/20 text-center shadow-2xl scale-95 transition-transform duration-300" id="installerContent">
        <div class="mb-4 relative inline-block">
            <div class="w-16 h-16 border-3 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
            <i class="fas fa-download absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-xl text-blue-500"></i>
        </div>
        <h3 id="instTitle" class="text-base font-black italic mb-1 tracking-tight uppercase">Installing Media</h3>
        <p id="installStatus" class="text-[9px] text-gray-400 font-bold uppercase tracking-wider mb-5">Initializing...</p>
        
        <div class="w-full bg-white/10 h-1.5 rounded-full overflow-hidden mb-2">
            <div id="installProgress" class="progress-bar-fill h-full bg-blue-500 w-0 transition-all duration-300"></div>
        </div>
        <div class="flex justify-between text-[8px] font-black text-blue-500 uppercase px-1 mb-4">
            <span id="percentLabel">0%</span>
            <span>XFourteen Link</span>
        </div>

        <div id="manualDownloadArea" class="hidden">
            <a id="manualLink" href="#" target="_blank" class="block w-full py-2 bg-blue-500/20 border border-blue-500/50 rounded-xl text-[10px] font-black text-blue-400 uppercase tracking-tighter">
                Click to Install Manually
            </a>
        </div>
    </div>
</div>

<div id="overlay" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[150] hidden opacity-0 transition-opacity duration-300"></div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar fixed top-0 left-0 w-[85%] max-w-[300px] h-full glass z-[200] p-5 flex flex-col">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h3 class="text-xl font-black italic">X14HOLIC</h3>
            <p class="text-[9px] font-bold text-blue-500 tracking-wider uppercase">Elite XFourteen System</p>
        </div>
        <button id="closeBtn" class="text-2xl text-gray-500 active:text-white transition p-2">&times;</button>
    </div>
    
    <div class="flex-1 space-y-6 overflow-y-auto pr-1 sidebar-content-scroll">
        <!-- TIKTOK SECTION -->
        <div class="space-y-2">
            <label class="text-[9px] font-black text-gray-500 uppercase tracking-[0.2em]">TikTok Tools [BETA]</label>
            <div class="p-4 bg-white/5 rounded-2xl border border-white/10 space-y-3">
                <input id="ttUrl" type="text" placeholder="Paste TikTok link..." class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none text-white">
                <div class="flex gap-2">
                    <button id="ttBtn" class="flex-1 bg-blue-600 py-2 rounded-xl text-[9px] font-black uppercase text-white">Video</button>
                    <button id="ttAudioBtn" class="flex-1 bg-gray-700 py-2 rounded-xl text-[9px] font-black uppercase text-white">MP3/Sound</button>
                </div>
            </div>
        </div>

        <!-- SPOTIFY SECTION -->
        <div class="space-y-2">
            <label class="text-[9px] font-black text-gray-500 uppercase tracking-[0.2em]">Spotify Tools [COMING]</label>
            <div class="p-4 bg-white/5 rounded-2xl border border-white/10 space-y-3">
                <p class="text-[10px] font-extrabold text-white flex items-center gap-2">
                    <i class="fab fa-spotify text-green-500 text-sm"></i> Music Downloader
                </p>
                <input id="spotUrl" type="text" placeholder="Paste Spotify link..." class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none text-white">
                <button id="spotBtn" class="w-full bg-green-600 py-2 rounded-xl text-[10px] font-black uppercase text-white">Download Track</button>
            </div>
        </div>
    </div>
    
    <div class="mt-auto pt-5 border-t border-white/10 flex flex-col items-center">
        <p class="text-[8px] text-gray-600 font-black tracking-widest">DZIYX PROTOCOL V1.2</p>
    </div>
</div>

<div class="max-w-5xl mx-auto flex flex-col px-3 relative z-10">
    <header class="glass mt-3 px-4 py-3 rounded-2xl flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="menuBtn" class="w-9 h-9 rounded-xl bg-white/5 flex items-center justify-center">
                <i class="fas fa-bars-staggered text-blue-500"></i>
            </button>
            <h1 class="text-lg font-black italic">XFOURTEEN<span class="text-blue-500">AI</span></h1>
        </div>
        <div class="w-8 h-8 rounded-full border border-blue-500/30 overflow-hidden">
            <img src="https://ui-avatars.com/api/?name=DziyX&background=007AFF&color=fff&bold=true" class="w-full h-full" alt="DziyX">
        </div>
    </header>

    <div id="chatArea" class="chat-area flex-1 overflow-y-auto py-5 flex flex-col gap-1"></div>

    <div class="pb-3 pt-1 pb-safe">
        <div class="input-wrapper rounded-2xl p-1.5 flex items-end gap-2">
            <textarea id="userInput" rows="1" placeholder="Type message..." class="w-full bg-transparent border-none resize-none text-sm py-3 px-4 outline-none text-white"></textarea>
            <button id="sendBtn" class="bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center text-white">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
